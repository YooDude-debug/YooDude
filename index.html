<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>YooDude</title>

<link rel="icon" type="image/png" href="logo.png">

<style>

html{
scroll-behavior:smooth;
}

body{
margin:0;
background:#0f0f0f;
color:white;
font-family:Arial,Helvetica,sans-serif;
text-align:center;
}

header{
padding:60px 20px;
background:#111;
border-bottom:2px solid #39ff14;
box-shadow:0 0 25px rgba(57,255,20,.2);
}

h1{
font-size:65px;
margin:0;
color:#39ff14;
text-shadow:0 0 15px #39ff14;
}

p{
color:#cccccc;
font-size:20px;
line-height:1.6;
}

button{
margin-top:30px;
background:#39ff14;
color:black;
border:none;
padding:18px 45px;
border-radius:50px;
font-size:20px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.08);
box-shadow:0 0 25px #39ff14;
}

.card{
width:700px;
max-width:90%;
margin:60px auto;
background:#1b1b1b;
border-radius:20px;
padding:30px;
box-shadow:0 0 25px rgba(57,255,20,.25);
}

.tag{
display:inline-block;
background:#39ff14;
color:black;
padding:10px 22px;
border-radius:30px;
font-weight:bold;
font-size:18px;
margin-bottom:15px;
}

video{
width:100%;
border-radius:15px;
margin-top:25px;
box-shadow:0 0 20px rgba(57,255,20,.25);
}

footer{
padding:50px;
color:#666;
font-size:15px;
}

</style>

</head>

<body>

<header>

<h1>YooDude</h1>

<p>
Discover Slang.<br>
Feel the Vibe.
</p>

<a href="#video">
<button>Enter the Vibe</button>
</a>

</header>

<div class="card" id="video">

<div class="tag">$Moin</div>

<h2>Willkommen bei YooDude</h2>

<p>
Die erste Social-Media-Plattform rund um SlangTags,
regionale Kultur und echte Vibes.
</p>

<video controls>
<source src="yoodude.mp4" type="video/mp4">
Dein Browser unterstützt keine Videos.
</video>

</div>
  <section class="regions">

<h2>Choose Your Region</h2>

<div class="region-grid">

<div class="region-card">
<img src="assets/rostock.jpg" alt="Rostock">
<h3>🌊 Rostock</h3>
<p>Warnemünder Backfisch</p>
<span>$Moin</span>
<button>Explore</button>
</div>

<div class="region-card">
<img src="assets/berlin.jpg" alt="Berlin">
<h3>🏙 Berlin / Brandenburg</h3>
<p>Currywurst</p>
<span>$Digga</span>
<button>Explore</button>
</div>

</div>

</section>

<footer>

Coming Soon © 2026 YooDude

</footer>

</body>
</html>
